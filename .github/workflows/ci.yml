name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  conformance:
    name: Conformance suite + spec examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: Run conformance test suite
        run: uv run --locked python tests/validate.py
      - name: Validate worked examples in the spec
        run: uv run --locked python tests/check_examples.py
      - name: Validate registry and matrix metadata
        run: uv run --locked python tests/check_registry.py
      - name: Reproduce survivability matrix
        run: uv run --locked python tests/check_survivability.py
